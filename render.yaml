# Render Blueprint — peerup-backend ücretsiz canlı yayın
# Kurulum: https://dashboard.render.com/blueprints → New Blueprint Instance → bu repo

services:
  - type: web
    name: peerup-backend
    runtime: node
    plan: free               # ücretsiz katman (15 dk hareketsizlikte uyur, ~50 sn cold start)
    region: frankfurt        # Türkiye'ye en yakın free bölge
    branch: main
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true         # git push → otomatik deploy
    envVars:
      - key: DATABASE_URL          # Supabase pooler bağlantı dizesi — kurulumda elden gir
        sync: false
      - key: JWT_SECRET            # Render otomatik üretir
        generateValue: true
      - key: ADMIN_JWT_SECRET      # Render otomatik üretir (Vercel'e de aynısını yapıştır)
        generateValue: true
      - key: ADMIN_PROXY_SECRET    # Render otomatik üretir
        generateValue: true
      - key: SEED_ADMIN_EMAIL
        value: admin@peerup.com
      - key: SEED_ADMIN_PASSWORD
        sync: false                # kurulumda elden gir (örn. peerup1234)
      - key: SEED_ADMIN_NAME
        value: PeerUP Admin
